<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <title>Manage Job - MicroJobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1', darkBg: '#0f172a', darkCard: '#1e293b' } } } }
    </script>
    <style>
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body
    class="bg-darkBg text-white min-h-screen bg-[conic-gradient(at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-indigo-950 to-slate-900">
    <script src="script.js"></script>
    <script>checkAuth();</script>

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <a href="dashboard.html"
            class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-teal-400">MicroJobs</a>
        <div class="flex items-center gap-6">
            <a href="dashboard.html" class="text-gray-300 font-medium hover:text-white transition-colors">Dashboard</a>
            <a href="jobs.html" class="text-gray-300 font-medium hover:text-white transition-colors">Browse Jobs</a>
            <button onclick="logout()"
                class="px-4 py-2 border border-red-500 text-red-500 hover:bg-red-500 hover:text-white rounded-lg transition-all text-sm font-medium">Logout</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 mt-8">
        <div id="errorMsg"
            class="hidden bg-red-500/10 border border-red-500 text-red-500 p-4 rounded-xl text-sm mb-6 relative">
            <span id="errorText"></span>
            <button onclick="document.getElementById('errorMsg').classList.add('hidden')"
                class="absolute top-2 right-2 text-red-500">&times;</button>
        </div>
        <div id="successMsg"
            class="hidden bg-green-500/10 border border-green-500 text-green-500 p-4 rounded-xl text-sm mb-6 relative">
            <span id="successText"></span>
            <button onclick="document.getElementById('successMsg').classList.add('hidden')"
                class="absolute top-2 right-2 text-green-500">&times;</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="glass p-10 rounded-3xl shadow-xl border border-slate-700/50">
                    <div class="flex justify-between items-start mb-4">
                        <h1 class="text-3xl font-bold text-white relative" id="jobTitle">
                            <span class="block w-64 h-8 bg-slate-800 rounded animate-pulse"></span>
                        </h1>
                        <span id="jobStatus"
                            class="font-bold px-3 py-1 rounded-full text-sm border bg-slate-800 text-gray-300 tracking-wide uppercase">...</span>
                    </div>
                    <p class="text-teal-400 font-semibold mb-4 text-xl" id="jobBudget"></p>
                    <p class="text-gray-300 mb-6" id="jobDescription"></p>

                    <div id="actionArea" class="mt-8 pt-6 border-t border-slate-700/50 hidden">
                        <!-- Actions injected here based on role and status -->
                    </div>
                </div>

                <div id="applicationsSection"
                    class="glass p-10 rounded-3xl shadow-xl border border-slate-700/50 hidden">
                    <h2 class="text-2xl font-bold text-white mb-6">Applications Received</h2>
                    <div id="applicationsContainer" class="space-y-4">
                        <p class="text-gray-500">No applications yet.</p>
                    </div>
                </div>

                <div id="reviewSection" class="glass p-10 rounded-3xl shadow-xl border border-slate-700/50 hidden">
                    <h2 class="text-2xl font-bold text-white mb-4">Leave a Review</h2>
                    <div id="reviewFormContainer">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-300 mb-2">Rating (1-5)</label>
                            <input type="number" id="reviewRating" min="1" max="5" required
                                class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-600 outline-none focus:border-primary text-white">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-300 mb-2">Feedback</label>
                            <textarea id="reviewFeedback" rows="3"
                                class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-600 outline-none focus:border-primary text-white"></textarea>
                        </div>
                        <button onclick="submitReview()"
                            class="px-6 py-2 bg-primary hover:bg-indigo-500 rounded-xl font-bold transition-all shadow-[0_0_15px_rgba(99,102,241,0.4)]">Submit
                            Review</button>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <div class="glass p-8 rounded-3xl shadow-xl border border-slate-700/50">
                    <h3 class="text-xl font-bold text-white mb-4">Task Details</h3>
                    <div class="space-y-3 text-sm">
                        <div class="flex justify-between border-b border-slate-700/50 pb-2">
                            <span class="text-gray-500 flex items-center gap-2"><svg class="w-4 h-4" fill="none"
                                    stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                                    </path>
                                </svg> Deadline</span>
                            <span class="text-white font-medium" id="jobDeadline">...</span>
                        </div>
                        <div class="flex justify-between border-b border-slate-700/50 pb-2">
                            <span class="text-gray-500">Posted On</span>
                            <span class="text-white" id="jobCreated">...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');
        const role = localStorage.getItem('user_role');
        let currentJob = null;

        function showMessage(type, text) {
            const el = document.getElementById(type + 'Msg');
            document.getElementById(type + 'Text').textContent = text;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        async function loadJob() {
            if (!jobId) { window.location.href = 'dashboard.html'; return; }
            try {
                const res = await fetch(`${API_BASE}/jobs/${jobId}`, { headers: getAuthHeaders() });
                if (!res.ok) throw new Error('Failed to fetch job details');
                currentJob = await res.json();

                document.getElementById('jobTitle').textContent = currentJob.title;
                document.getElementById('jobDescription').textContent = currentJob.description;
                document.getElementById('jobBudget').textContent = '$' + parseFloat(currentJob.budget).toFixed(2);
                document.getElementById('jobStatus').textContent = currentJob.status;

                // Color status cleanly
                const statusEl = document.getElementById('jobStatus');
                statusEl.className = 'font-bold px-3 py-1 rounded-full text-sm border tracking-wide uppercase ';
                if (currentJob.status === 'COMPLETED') statusEl.className += 'bg-slate-700 text-gray-400 border-gray-600';
                else if (currentJob.status === 'OPEN') statusEl.className += 'bg-green-500/20 text-green-400 border-green-500/30';
                else if (currentJob.status === 'ASSIGNED') statusEl.className += 'bg-blue-500/20 text-blue-400 border-blue-500/30';
                else if (currentJob.status === 'IN_PROGRESS') statusEl.className += 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30';
                else if (currentJob.status === 'SUBMITTED') statusEl.className += 'bg-purple-500/20 text-purple-400 border-purple-500/30';

                const dDate = new Date(currentJob.deadline);
                const cDate = new Date(currentJob.created_at);
                document.getElementById('jobDeadline').textContent = isNaN(dDate) ? 'N/A' : dDate.toISOString().split('T')[0];
                document.getElementById('jobCreated').textContent = isNaN(cDate) ? 'N/A' : cDate.toLocaleDateString();

                renderActions();
                if (role === 'PROVIDER' || role === 'ADMIN') {
                    loadApplications();
                }
            } catch (err) {
                showMessage('error', err.message);
            }
        }

        async function loadApplications() {
            try {
                const res = await fetch(`${API_BASE}/jobs/${jobId}/applications`, { headers: getAuthHeaders() });
                if (!res.ok) return;
                const apps = await res.json();

                const container = document.getElementById('applicationsContainer');
                document.getElementById('applicationsSection').classList.remove('hidden');

                if (apps.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 italic">No applications received yet.</p>';
                    return;
                }

                container.innerHTML = apps.map(app => `
                    <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:border-primary/50 transition-colors">
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <p class="font-medium text-white">Student ID: ${app.student_id}</p>
                                <span class="text-[10px] font-bold uppercase inline-block px-2 py-0.5 rounded border border-slate-600 ${app.status === 'ACCEPTED' ? 'bg-green-500/20 text-green-400 border-green-500/30' : 'bg-slate-700'}">${app.status}</span>
                            </div>
                            <p class="text-sm text-gray-300 italic">"${app.cover_letter}"</p>
                            ${app.submission_text ? '<div class="mt-3 p-3 bg-slate-700/50 border border-slate-600 rounded-lg"><p class="text-xs text-slate-400 mb-1 font-semibold uppercase">Submitted Work:</p><p class="text-sm text-white break-all">' + app.submission_text + '</p></div>' : ''}
                        </div>
                        ${currentJob.status === 'OPEN' && app.status === 'APPLIED' ?
                        '<button onclick="acceptApplication(' + app.id + ')" class="px-5 py-2 whitespace-nowrap bg-primary hover:bg-indigo-500 rounded-xl text-sm font-bold transition-all shadow-[0_0_10px_rgba(99,102,241,0.3)] hover:shadow-[0_0_15px_rgba(99,102,241,0.5)]">Accept Applicant</button>'
                        : ''}
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        function renderActions() {
            const area = document.getElementById('actionArea');
            let html = '';

            if (role === 'STUDENT') {
                if (currentJob.status === 'ASSIGNED') {
                    html = '<button onclick="updateStatus(\'IN_PROGRESS\')" class="px-6 py-3 bg-yellow-500 hover:bg-yellow-400 text-black rounded-xl font-bold transition-all shadow-[0_0_15px_rgba(234,179,8,0.4)]">Start Working (Mark In-Progress)</button>';
                } else if (currentJob.status === 'IN_PROGRESS') {
                    html = `
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-300 mb-2">Submit Work (Link, Google Doc, etc.)</label>
                            <textarea id="submissionText" rows="3" class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-600 outline-none focus:border-primary text-white" required placeholder="Paste the link to your completed work here..."></textarea>
                        </div>
                        <button onclick="updateStatus('SUBMITTED')" class="px-6 py-3 bg-purple-500 hover:bg-purple-400 text-white rounded-xl font-bold transition-all shadow-[0_0_15px_rgba(168,85,247,0.4)]">Submit Completed Work</button>
                    `;
                } else if (currentJob.status === 'COMPLETED') {
                    if (currentJob.reviews && currentJob.reviews.length > 0) {
                        const r = currentJob.reviews[0];
                        html = `
                            <div class="p-5 bg-slate-800/50 border border-slate-600 rounded-2xl">
                                <h4 class="text-lg font-bold text-white mb-2">Provider's Feedback</h4>
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-yellow-400 font-bold">★ ${r.rating}/5</span>
                                </div>
                                <p class="text-sm text-gray-300 italic">"${r.feedback || 'No written feedback provided.'}"</p>
                            </div>
                        `;
                    } else {
                        html = '<p class="text-gray-400 italic">Job completed. Waiting for provider review...</p>';
                    }
                }
            } else if (role === 'PROVIDER' || role === 'ADMIN') {
                if (currentJob.status === 'SUBMITTED') {
                    html = '<button onclick="updateStatus(\'COMPLETED\')" class="px-6 py-3 bg-green-500 hover:bg-green-400 text-black rounded-xl font-bold transition-all shadow-[0_0_15px_rgba(34,197,94,0.4)]">Review Approved (Mark Completed)</button>';
                } else if (currentJob.status === 'COMPLETED') {
                    if (currentJob.reviews && currentJob.reviews.length > 0) {
                        const r = currentJob.reviews[0];
                        html = `
                            <div class="p-5 bg-slate-800/50 border border-slate-600 rounded-2xl mt-4">
                                <h4 class="text-lg font-bold text-white mb-2">Your Feedback</h4>
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-yellow-400 font-bold">★ ${r.rating}/5</span>
                                </div>
                                <p class="text-sm text-gray-300 italic">"${r.feedback || 'No written feedback provided.'}"</p>
                            </div>
                        `;
                    } else {
                        document.getElementById('reviewSection').classList.remove('hidden');
                    }
                } else if (currentJob.status === 'OPEN') {
                    html = '<button onclick="deleteJob(' + currentJob.id + ')" class="px-6 py-3 bg-transparent border border-red-500 text-red-500 hover:bg-red-500 hover:text-white rounded-xl font-bold transition-all">Delete Job Listing</button>';
                }
            }

            if (html) {
                area.innerHTML = html;
                area.classList.remove('hidden');
            } else {
                area.classList.add('hidden');
            }
        }

        window.acceptApplication = async function (appId) {
            if (!confirm('Are you sure you want to accept this application? All others will be permanently rejected.')) return;
            try {
                const res = await fetch(`${API_BASE}/applications/${appId}/accept`, {
                    method: 'PUT',
                    headers: getAuthHeaders()
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);
                showMessage('success', 'Application accepted! The job is now ASSIGNED.');
                loadJob();
            } catch (err) {
                showMessage('error', err.message);
            }
        };

        window.updateStatus = async function (newStatus) {
            let payload = { status: newStatus };

            if (newStatus === 'SUBMITTED') {
                const subTextEl = document.getElementById('submissionText');
                if (subTextEl && !subTextEl.value.trim()) {
                    showMessage('error', 'Please provide a link or description of your submitted work.');
                    return;
                }
                if (subTextEl) payload.submission_text = subTextEl.value.trim();
            }

            try {
                const res = await fetch(`${API_BASE}/jobs/${jobId}/status`, {
                    method: 'PUT',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);
                showMessage('success', 'Job status updated to ' + newStatus);
                loadJob();
            } catch (err) {
                showMessage('error', err.message);
            }
        };

        window.submitReview = async function () {
            const rating = document.getElementById('reviewRating').value;
            const feedback = document.getElementById('reviewFeedback').value;

            if (!rating || rating < 1 || rating > 5) {
                showMessage('error', 'Rating must be between 1 and 5');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/jobs/${jobId}/review`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ rating: parseInt(rating), feedback })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);
                showMessage('success', 'Review submitted successfully!');
                document.getElementById('reviewFormContainer').innerHTML = '<p class="text-green-500 py-4 font-medium flex items-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Thank you for your review!</p>';
            } catch (err) {
                showMessage('error', err.message);
            }
        };

        window.deleteJob = async function (id) {
            if (!confirm('Delete this job permanently? This action cannot be undone.')) return;
            try {
                const res = await fetch(`${API_BASE}/jobs/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });
                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.message);
                }
                window.location.href = 'jobs.html';
            } catch (err) {
                showMessage('error', err.message);
            }
        };

        document.addEventListener('DOMContentLoaded', loadJob);
    </script>
</body>

</html>
