<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - MicroJobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1', darkBg: '#0f172a', darkCard: '#1e293b' } } } }
    </script>
    <style>
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body
    class="bg-darkBg text-white min-h-screen bg-[conic-gradient(at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-indigo-950 to-slate-900">
    <script src="script.js"></script>
    <script>checkAuth();</script>

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <a href="index.html"
            class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-teal-400">MicroJobs</a>
        <div class="flex items-center gap-6">
            <a href="dashboard.html" class="text-primary font-medium hover:text-white transition-colors">Dashboard</a>
            <a href="jobs.html" class="text-gray-300 font-medium hover:text-white transition-colors">Browse Jobs</a>
            <div id="navProviderLinks" class="hidden">
                <a href="post_job.html" class="text-gray-300 font-medium hover:text-white transition-colors ml-4">Post a
                    Job</a>
            </div>
            <button onclick="logout()"
                class="px-4 py-2 border border-red-500 text-red-500 hover:bg-red-500 hover:text-white rounded-lg transition-all text-sm font-medium">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-6 mt-8">
        <div
            class="glass p-8 rounded-3xl shadow-xl border border-slate-700/50 flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold tracking-tight mb-2">Welcome, <span id="userNameDisplay"
                        class="text-primary">User</span>!</h1>
                <p class="text-gray-400 text-lg">You are signed in as a <span id="userRoleDisplay"
                        class="font-semibold px-3 py-1 bg-slate-800 rounded-md text-sm">ROLE</span></p>
            </div>
            <div class="mt-6 md:mt-0 flex gap-4" id="roleActionButtons">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Profile Info -->
            <div class="glass p-6 rounded-3xl">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><svg class="w-5 h-5 text-primary" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg> Your Profile</h3>
                <div id="profileDetails" class="text-gray-300 space-y-2">
                    <div class="animate-pulse bg-slate-800 h-6 rounded w-3/4 mb-2"></div>
                    <div class="animate-pulse bg-slate-800 h-6 rounded w-1/2"></div>
                </div>
            </div>

            <!-- Dashboard Stats / Recent Activity -->
            <div class="glass p-6 rounded-3xl">
                <h3 class="text-xl font-bold mb-4" id="activityTitle">Recent Activity</h3>
                <div id="activityDetails" class="space-y-4">
                    <div class="animate-pulse bg-slate-800 h-16 rounded-xl w-full"></div>
                    <div class="animate-pulse bg-slate-800 h-16 rounded-xl w-full text-center py-4 text-gray-500">
                        Loading activity...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const role = localStorage.getItem('user_role');
            const name = localStorage.getItem('user_name');
            window.userSkills = [];

            document.getElementById('userNameDisplay').textContent = name || 'User';
            document.getElementById('userRoleDisplay').textContent = role || 'USER';

            if (role === 'PROVIDER' || role === 'ADMIN') {
                const navProvider = document.getElementById('navProviderLinks');
                if (navProvider) navProvider.classList.remove('hidden');

                document.getElementById('roleActionButtons').innerHTML = `
                    <a href="post_job.html" class="px-6 py-3 bg-primary hover:bg-indigo-500 rounded-xl font-medium shadow-[0_0_15px_rgba(99,102,241,0.4)] transition-all flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> Post Job
                    </a>
                    <a href="jobs.html" class="px-6 py-3 border border-slate-600 hover:bg-slate-800 rounded-xl font-medium transition-all">Manage Jobs</a>
                `;
                document.getElementById('activityTitle').textContent = 'Your Posted Jobs Summary';
            } else {
                document.getElementById('roleActionButtons').innerHTML = `
                    <a href="jobs.html" class="px-6 py-3 bg-primary hover:bg-indigo-500 rounded-xl font-medium shadow-[0_0_15px_rgba(99,102,241,0.4)] transition-all">Browse Open Tasks</a>
                `;
                document.getElementById('activityTitle').textContent = 'Your Applications';
            }

            // Fetch profile
            try {
                const res = await fetch(`${API_BASE}/users/me`, {
                    headers: getAuthHeaders()
                });
                if (res.status === 401) {
                    logout();
                    return;
                }

                if (res.ok) {


                    const data = await res.json();
                    window.userSkills = data.skills || [];
                    let skillsHtml = `
                        <div class="flex flex-col space-y-3 mt-4">
                            <div class="flex items-center justify-between border-b border-slate-700/50 pb-2">
                                <span class="text-gray-500">Email</span>
                                <span class="text-white">${data.email}</span>
                            </div>
                            <div class="flex items-center justify-between border-b border-slate-700/50 pb-2">
                                <span class="text-gray-500">Account Type</span>
                                <span class="text-white bg-slate-800 px-2 py-0.5 rounded text-sm">${data.role}</span>
                            </div>
                            ${role === 'STUDENT' ? `
                            <div class="pt-2">
                                <div class="text-gray-500 mb-2">Skills</div>
                                ${window.userSkills.length > 0 ?
                                '<div class="flex flex-wrap gap-2">' + window.userSkills.map(s => '<span class="px-3 py-1 bg-primary/20 text-primary border border-primary/30 rounded-full text-xs font-medium">' + s.skill_name + '</span>').join('') + '</div>'
                                : '<span class="text-sm text-yellow-500/80 bg-yellow-500/10 px-3 py-1 rounded-lg block w-fit">No skills added yet</span>'}
                            </div>` : ''}
                        </div>
                    `;

                    if (role === 'STUDENT') {
                        skillsHtml += `
                        <div class="mt-6 pt-4 border-t border-slate-700/50">
                            <div id="skillMsg" class="hidden p-2 rounded text-sm mb-2"></div>
                            <form onsubmit="addSkill(event)" class="flex gap-2">
                                <input type="text" id="newSkillInput" placeholder="Add a new skill (e.g. Python)" required class="flex-1 px-3 py-2 rounded-lg bg-slate-800 border border-slate-600 outline-none focus:border-primary text-sm">
                                <button type="submit" class="px-4 py-2 bg-primary hover:bg-indigo-500 rounded-lg font-medium text-sm transition-colors">Add</button>
                            </form>
                        </div>`;
                    }
                    document.getElementById('profileDetails').innerHTML = skillsHtml;
                }

                // Fetch Recent Activity Dashboard
                const actRes = await fetch(`${API_BASE}/users/me/dashboard`, {
                    headers: getAuthHeaders()
                });

                if (actRes.ok) {
                    const activities = await actRes.json();
                    const activityContainer = document.getElementById('activityDetails');

                    if (activities.length === 0) {
                        activityContainer.innerHTML = '<div class="text-gray-500 text-center py-8 border border-dashed border-slate-700 rounded-xl">No recent activity found.</div>';
                    } else {
                        activityContainer.innerHTML = activities.map(act => {
                            if (act.type === 'APPLICATION') {
                                return `
                                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 hover:border-primary/50 transition-colors flex justify-between items-center">
                                    <div>
                                        <p class="font-bold text-white mb-1"><a href="manage_job.html?id=${act.job_id}" class="hover:text-primary transition-colors">${act.job_title}</a></p>
                                        <p class="text-xs text-gray-400"><span class="text-teal-400 font-semibold">$${act.job_budget}</span> • Job is currently ${act.job_status}</p>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-[10px] uppercase font-bold px-2 py-1 rounded bg-slate-700 text-white">${act.app_status}</span>
                                    </div>
                                </div>`;
                            } else {
                                return `
                                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50 hover:border-primary/50 transition-colors flex justify-between items-center">
                                    <div>
                                        <p class="font-bold text-white mb-1"><a href="manage_job.html?id=${act.job_id}" class="hover:text-primary transition-colors">${act.job_title}</a></p>
                                        <p class="text-xs text-gray-400">Budget: <span class="text-teal-400 font-semibold">$${act.job_budget}</span></p>
                                    </div>
                                    <div class="text-right flex flex-col items-end gap-1">
                                        <span class="text-[10px] uppercase font-bold px-2 py-1 rounded bg-indigo-500/20 text-indigo-400 border border-indigo-500/30">${act.job_status}</span>
                                        <span class="text-xs text-gray-500">${act.date}</span>
                                    </div>
                                </div>`;
                            }
                        }).join('');
                    }
                }
            } catch (err) {
                console.error("Failed to load profile", err);
            }
        });

        async function addSkill(e) {
            e.preventDefault();
            const input = document.getElementById('newSkillInput');
            const msgDiv = document.getElementById('skillMsg');
            const newSkillName = input.value.trim();
            const btn = e.target.querySelector('button');

            if (!newSkillName) return;

            btn.disabled = true;
            btn.textContent = '...';

            // Append new skill to existing array
            const updatedSkills = [...window.userSkills, { skill_name: newSkillName, level: 'Intermediate' }];

            try {
                const res = await fetch(`${API_BASE}/users/me`, {
                    method: 'PUT',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ skills: updatedSkills })
                });

                if (!res.ok) {
                    const error = await res.json();
                    throw new Error(error.message || 'Failed to add skill');
                }

                msgDiv.textContent = 'Skill added successfully!';
                msgDiv.className = 'p-2 rounded text-sm mb-2 bg-green-500/10 text-green-500 border border-green-500 block';

                // Reload page to refresh profile
                setTimeout(() => window.location.reload(), 800);
            } catch (err) {
                msgDiv.textContent = err.message;
                msgDiv.className = 'p-2 rounded text-sm mb-2 bg-red-500/10 text-red-500 border border-red-500 block';
                btn.disabled = false;
                btn.textContent = 'Add';
            }
        }
    </script>
</body>

</html>
