<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroJobs - Your Micro Task Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#14b8a6',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body
    class="bg-darkBg text-white min-h-screen flex flex-col flex-grow items-center justify-center bg-[conic-gradient(at_bottom_right,_var(--tw-gradient-stops))] from-slate-900 via-purple-900 to-slate-900">

    <div
        class="glass p-10 md:p-14 rounded-3xl shadow-[0_0_50px_rgba(99,102,241,0.2)] text-center max-w-2xl w-full mx-4 animate-fade-in relative overflow-hidden">
        <!-- Decoration -->
        <div
            class="absolute -top-24 -right-24 w-48 h-48 bg-primary rounded-full mix-blend-multiply filter blur-3xl opacity-30">
        </div>
        <div
            class="absolute -bottom-24 -left-24 w-48 h-48 bg-secondary rounded-full mix-blend-multiply filter blur-3xl opacity-30">
        </div>

        <h1 class="relative text-5xl md:text-6xl font-extrabold mb-6 tracking-tight">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">
                MicroJobs
            </span>
        </h1>
        <p class="relative text-gray-300 text-lg md:text-xl mb-12 font-light">
            Connect talented students with local providers for fast, reliable task completion.
        </p>

        <div class="relative flex flex-col sm:flex-row justify-center gap-6">
            <a href="login.html"
                class="px-8 py-4 bg-primary hover:bg-indigo-500 transition-all duration-300 rounded-xl font-medium shadow-[0_0_20px_rgba(99,102,241,0.4)] hover:shadow-[0_0_30px_rgba(99,102,241,0.6)] hover:-translate-y-1 text-lg w-full sm:w-auto">
                Login
            </a>
            <a href="register.html"
                class="px-8 py-4 bg-transparent border border-gray-600 hover:border-gray-400 hover:bg-gray-800/50 transition-all duration-300 rounded-xl font-medium text-white shadow-lg text-lg w-full sm:w-auto">
                Create Account
            </a>
        </div>
    </div>

    <!-- Script to check if already logged in -->
    <script src="script.js"></script>
    <script>
        if (localStorage.getItem('jwt_token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
