<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <title>Login - MicroJobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { primary: '#6366f1', darkBg: '#0f172a' } }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body
    class="bg-darkBg text-white min-h-screen flex items-center justify-center bg-[conic-gradient(at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-indigo-950 to-slate-900">
    <div class="glass p-10 rounded-3xl shadow-2xl w-full max-w-md mx-4">
        <h2 class="text-3xl font-bold mb-2 text-center text-primary">Welcome Back</h2>
        <p class="text-gray-400 text-center mb-8">Login to access your tasks</p>

        <form id="loginForm" class="space-y-6">
            <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500 text-red-500 p-3 rounded-lg text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-700 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-700 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
            </div>

            <button type="submit"
                class="w-full py-3 bg-primary hover:bg-indigo-500 rounded-xl font-semibold transition-all shadow-[0_0_15px_rgba(99,102,241,0.4)] hover:shadow-[0_0_25px_rgba(99,102,241,0.6)] mt-4">
                Sign In
            </button>
        </form>

        <p class="mt-6 text-center text-gray-400">
            Don't have an account? <a href="register.html" class="text-primary hover:underline">Register</a>
        </p>
        <p class="mt-2 text-center text-sm">
            <a href="index.html" class="text-gray-500 hover:text-gray-300 transition-colors">← Back to Home</a>
        </p>
    </div>

    <script src="script.js"></script>
</body>

</html>
