<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <title>Browse Jobs - MicroJobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1', darkBg: '#0f172a', darkCard: '#1e293b' } } } }
    </script>
    <style>
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body
    class="bg-darkBg text-white min-h-screen bg-[conic-gradient(at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-indigo-950 to-slate-900">
    <script src="script.js"></script>
    <script>checkAuth();</script>

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <a href="dashboard.html"
            class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-teal-400">MicroJobs</a>
        <div class="flex items-center gap-6">
            <a href="dashboard.html" class="text-gray-300 font-medium hover:text-white transition-colors">Dashboard</a>
            <a href="jobs.html" class="text-primary font-medium hover:text-white transition-colors">Browse Jobs</a>
            <div id="navProviderLinks" class="hidden">
                <a href="post_job.html" class="text-gray-300 font-medium hover:text-white transition-colors ml-4">Post a
                    Job</a>
            </div>
            <button onclick="logout()"
                class="px-4 py-2 border border-red-500 text-red-500 hover:bg-red-500 hover:text-white rounded-lg transition-all text-sm font-medium">Logout</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 mt-8">
        <div class="flex justify-between items-end mb-8 border-b border-slate-700/50 pb-4">
            <div>
                <h1 class="text-4xl font-bold tracking-tight mb-2">Open MicroJobs</h1>
                <p class="text-gray-400">Find the perfect task or manage your posted jobs.</p>
            </div>
        </div>

        <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500 text-red-500 p-4 rounded-xl mb-6"></div>

        <div id="jobsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Jobs injected here -->
            <div class="col-span-full text-center text-gray-500 py-12 animate-pulse glass rounded-xl border-dashed">
                Loading jobs...</div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const role = localStorage.getItem('user_role');
            if (role === 'PROVIDER' || role === 'ADMIN') {
                document.getElementById('navProviderLinks').classList.remove('hidden');
            }

            try {
                const res = await fetch(`${API_BASE}/jobs`, {
                    headers: getAuthHeaders()
                });
                if (!res.ok) throw new Error('Failed to fetch jobs');
                const jobs = await res.json();

                const container = document.getElementById('jobsContainer');
                container.innerHTML = '';

                if (jobs.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12 glass rounded-2xl border border-slate-700/50">No jobs available right now.</div>';
                    return;
                }

                jobs.forEach(job => {
                    const card = document.createElement('div');
                    card.className = 'glass p-6 rounded-2xl flex flex-col h-full hover:-translate-y-1 transition-transform duration-300 group';

                    const statusColors = {
                        'OPEN': 'bg-green-500/20 text-green-400 border-green-500/30',
                        'ASSIGNED': 'bg-blue-500/20 text-blue-400 border-blue-500/30',
                        'IN_PROGRESS': 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30',
                        'SUBMITTED': 'bg-purple-500/20 text-purple-400 border-purple-500/30',
                        'COMPLETED': 'bg-gray-500/20 text-gray-400 border-gray-500/30'
                    };
                    const badgeClass = statusColors[job.status] || 'bg-slate-700 text-white';

                    let actionHtml = '';
                    if (role === 'STUDENT' && job.status === 'OPEN') {
                        actionHtml = '<a href="apply.html?id=' + job.id + '" class="mt-auto block w-full text-center py-2.5 bg-primary hover:bg-indigo-500 rounded-xl font-semibold transition-colors shadow-lg shadow-primary/20">Apply Now</a>';
                    } else if (role === 'PROVIDER') {
                        // Assuming provider who created job can manage it. We'll simplify and show 'Manage' to all providers
                        actionHtml = '<a href="manage_job.html?id=' + job.id + '" class="mt-auto block w-full text-center py-2.5 bg-slate-700 hover:bg-slate-600 border border-slate-600 rounded-xl font-medium transition-colors">Manage Job</a>';
                    } else {
                        actionHtml = '<button disabled class="mt-auto w-full py-2.5 bg-slate-800 text-slate-500 cursor-not-allowed rounded-xl font-medium">Not Available for You</button>';
                    }

                    // Format date avoiding timezone shifts
                    const dDate = new Date(job.deadline);
                    const deadlineStr = isNaN(dDate) ? 'N/A' : dDate.toISOString().split('T')[0];

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-2xl font-bold text-teal-400">$${job.budget.toFixed(2)}</span>
                            <span class="text-[10px] uppercase font-bold px-2.5 py-1 rounded-full border ${badgeClass} tracking-wide">${job.status}</span>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2 group-hover:text-primary transition-colors">${job.title}</h3>
                        <p class="text-gray-400 text-sm mb-6 flex-grow line-clamp-3">${job.description}</p>
                        
                        <div class="flex items-center text-xs text-slate-500 mb-6 space-x-4">
                            <div class="flex items-center gap-1">
                                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> 
                                <span>Due: ${deadlineStr}</span>
                            </div>
                        </div>
                        
                        ${actionHtml}
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                showFormError(err.message, 'errorMsg');
            }
        });
    </script>
</body>

</html>
