<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <title>Apply for Job - MicroJobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1', darkBg: '#0f172a', darkCard: '#1e293b' } } } }
    </script>
    <style>
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body
    class="bg-darkBg text-white min-h-screen bg-[conic-gradient(at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-indigo-950 to-slate-900">
    <script src="script.js"></script>
    <script>
        if (!checkAuth() || localStorage.getItem('user_role') !== 'STUDENT') {
            window.location.href = 'dashboard.html';
        }
    </script>

    <!-- Navbar -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <a href="dashboard.html"
            class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-teal-400">MicroJobs</a>
        <div class="flex items-center gap-6">
            <a href="dashboard.html" class="text-gray-300 font-medium hover:text-white transition-colors">Dashboard</a>
            <a href="jobs.html" class="text-gray-300 font-medium hover:text-white transition-colors">Browse Jobs</a>
            <button onclick="logout()"
                class="px-4 py-2 border border-red-500 text-red-500 hover:bg-red-500 hover:text-white rounded-lg transition-all text-sm font-medium">Logout</button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-6 mt-8">
        <div class="glass p-10 rounded-3xl shadow-xl border border-slate-700/50">
            <h1 class="text-3xl font-bold mb-2 text-white">Apply for Job</h1>
            <div id="jobDetails" class="mb-8 border-b border-slate-700/50 pb-6 text-gray-400">
                <div class="animate-pulse bg-slate-800 h-6 rounded w-1/2 mb-2"></div>
                <div class="animate-pulse bg-slate-800 h-4 rounded w-1/4 mb-4"></div>
                <div class="animate-pulse bg-slate-800 h-10 rounded w-full"></div>
            </div>

            <form id="applyJobForm" class="space-y-6 hidden">
                <div id="errorMsg"
                    class="hidden bg-red-500/10 border border-red-500 text-red-500 p-4 rounded-xl text-sm mb-4"></div>
                <div id="successMsg"
                    class="hidden bg-green-500/10 border border-green-500 text-green-500 p-4 rounded-xl text-sm mb-4">
                    Application submitted successfully! Redirecting to Dashboard...</div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Cover Letter</label>
                    <textarea id="coverLetter" required rows="6"
                        class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-600 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all text-white placeholder-gray-500 shadow-inner"
                        placeholder="Explain why you are the best fit for this task, highlight your skills..."></textarea>
                </div>

                <div class="pt-6 mt-8 flex items-center justify-end gap-4 border-t border-slate-700/50">
                    <a href="jobs.html"
                        class="px-6 py-3 text-gray-400 hover:text-white transition-colors font-medium">Cancel</a>
                    <button type="submit"
                        class="px-8 py-3 bg-primary hover:bg-indigo-500 rounded-xl font-bold transition-all shadow-[0_0_15px_rgba(99,102,241,0.4)]">Submit
                        Application</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const jobId = urlParams.get('id');
            if (!jobId) {
                window.location.href = 'jobs.html';
                return;
            }

            // Fetch Job details
            try {
                const res = await fetch(`${API_BASE}/jobs/${jobId}`, { headers: getAuthHeaders() });
                if (!res.ok) throw new Error('Failed to load job');
                const job = await res.json();

                document.getElementById('jobDetails').innerHTML = `
                    <h2 class="text-xl font-bold text-white mb-2">${job.title}</h2>
                    <p class="text-sm mb-2 text-teal-400 font-semibold border border-teal-500/30 bg-teal-500/10 rounded-full px-2 py-0.5 inline-block">Budget: $${parseFloat(job.budget).toFixed(2)}</p>
                    <p class="text-sm mt-3">${job.description}</p>
                `;
                document.getElementById('applyJobForm').classList.remove('hidden');
            } catch (err) {
                document.getElementById('jobDetails').innerHTML = `<p class="text-red-500 flex items-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Failed to load job details. It may have been deleted.</p>`;
            }

            document.getElementById('applyJobForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.innerHTML = 'Submitting...';

                const coverLetter = document.getElementById('coverLetter').value;

                try {
                    const res = await fetch(`${API_BASE}/jobs/${jobId}/apply`, {
                        method: 'POST',
                        headers: getAuthHeaders(),
                        body: JSON.stringify({ cover_letter: coverLetter })
                    });

                    const data = await res.json();
                    if (!res.ok) handleApiError(res, data);

                    document.getElementById('errorMsg').classList.add('hidden');
                    document.getElementById('successMsg').classList.remove('hidden');

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);

                } catch (err) {
                    showFormError(err.message, 'errorMsg');
                    btn.disabled = false;
                    btn.innerHTML = 'Submit Application';
                }
            });
        });
    </script>
</body>

</html>
